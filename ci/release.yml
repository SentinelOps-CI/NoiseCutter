name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (test only)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=test-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi
          
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          
      - name: Test wheel installation
        run: |
          pip install dist/*.whl
          noisecutter --help
          
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/noisecutter:${{ env.VERSION }} .
          docker build -t ghcr.io/${{ github.repository }}/noisecutter:latest .
          
      - name: Test Docker image
        run: |
          docker run --rm ghcr.io/${{ github.repository }}/noisecutter:${{ env.VERSION }} --help
          
      - name: Login to GHCR
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push Docker image
        if: ${{ !inputs.dry_run }}
        run: |
          docker push ghcr.io/${{ github.repository }}/noisecutter:${{ env.VERSION }}
          docker push ghcr.io/${{ github.repository }}/noisecutter:latest
          
      - name: Publish to PyPI (dry run)
        if: ${{ inputs.dry_run }}
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          python -m twine upload --repository testpypi dist/*
          
      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          python -m twine upload dist/*
          
      - name: Create GitHub Release
        if: ${{ !inputs.dry_run && github.event_name == 'push' }}
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## NoiseCutter ${{ github.ref_name }}
            
            ### Installation
            ```bash
            pip install noisecutter
            ```
            
            ### Docker
            ```bash
            docker run --rm ghcr.io/${{ github.repository }}/noisecutter:${{ github.ref_name }} --help
            ```
            
            ### Changes
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

