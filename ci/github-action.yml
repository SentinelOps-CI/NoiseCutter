name: noisecutter
on: [pull_request]
jobs:
  pr-fastpath:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install .
      - run: sudo curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - run: noisecutter sbom --source . --out sbom.cdx.json
      - run: noisecutter audit --sbom sbom.cdx.json --out vulns.json
      - run: noisecutter reach --lang go --entry ./cmd/server --vulns vulns.json --out reach.json || true
      - run: noisecutter fuse --sbom sbom.cdx.json --vulns vulns.json --reach reach.json --out report.sarif
      - run: noisecutter policy --sarif report.sarif --level high --fail-on reachable || true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: report.sarif


