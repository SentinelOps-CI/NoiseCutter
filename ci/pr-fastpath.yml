name: PR Fastpath

on:
  pull_request:
    branches: [ main ]

jobs:
  fastpath:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install sarif-tools
      - name: Install tools
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b ./bin v1.16.0
          echo "${{ github.workspace }}"/bin >> $GITHUB_PATH
      - name: Go multi-entry - build artifacts
        working-directory: examples/go-multi-entry
        env:
          NOISECUTTER_STRICT_REPRO: '1'
        run: |
          make all_artifacts
      - name: Verify golden
        working-directory: examples/go-multi-entry
        run: |
          make verify-golden
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: examples/go-multi-entry/report.server.sarif

