name: PR fastpath

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  go-multi-entry:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: uv.lock

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.9"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Python package
        run: uv sync --frozen --extra dev

      - name: Install Syft
        run: bash scripts/install-syft.sh
        env:
          SYFT_INSTALL_DIR: ${{ github.workspace }}/bin

      - name: Install govulncheck
        env:
          GOBIN: ${{ github.workspace }}/bin
        run: |
          mkdir -p "$GOBIN"
          go install golang.org/x/vuln/cmd/govulncheck@v1.2.0

      - name: Add tools to PATH
        run: echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Go multi-entry — build and verify goldens
        working-directory: examples/go-multi-entry
        env:
          NOISECUTTER_STRICT_REPRO: "1"
        run: |
          make all_artifacts
          make verify-golden

      - name: Upload SARIF (server)
        uses: github/codeql-action/upload-sarif@v3
        if: matrix.os == 'ubuntu-latest'
        with:
          sarif_file: examples/go-multi-entry/report.server.sarif

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: uv.lock

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.9"

      - name: Install and test
        run: |
          uv sync --frozen --extra dev
          uv run pytest tests/ -q --cov=noisecutter
