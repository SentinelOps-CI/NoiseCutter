<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">NoiseCutter</title>
  <desc id="desc">A minimal hero illustrating signal rising above noise</desc>
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="280" fill="url(#g2)"/>

  <!-- Noise lines -->
  <g stroke="#1f2937" stroke-width="1">
    <path d="M0,210 C60,180 120,230 180,200 S300,220 360,195 480,230 540,205 660,225 720,200 840,225 900,205 1020,230 1080,210 1140,230 1200,210" fill="none"/>
    <path d="M0,190 C80,210 160,170 240,195 S400,185 480,200 560,175 640,195 720,170 800,190 960,175 1040,195 1120,170 1200,190" fill="none" opacity="0.8"/>
    <path d="M0,230 C70,200 140,250 210,220 S350,240 420,215 560,240 630,220 770,240 840,220 980,240 1050,220 1130,240 1200,230" fill="none" opacity="0.6"/>
  </g>

  <!-- Signal path -->
  <path d="M0,170 C100,160 200,150 300,120 380,100 460,70 540,110 600,140 660,90 720,80 800,65 880,90 960,70 1040,60 1120,75 1200,65"
        stroke="url(#g1)" stroke-width="3" fill="none" filter="url(#glow)"/>

  <!-- Title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial" font-weight="700">
    <text x="48" y="96" font-size="44" fill="#e2e8f0">NoiseCutter</text>
    <text x="48" y="128" font-size="18" fill="#94a3b8">Prove what’s exploitable; ignore the rest</text>
  </g>

  <!-- Accent bars -->
  <rect x="48" y="148" width="180" height="3" fill="#22c55e"/>
  <rect x="234" y="148" width="120" height="3" fill="#0ea5e9" opacity="0.7"/>
</svg>

